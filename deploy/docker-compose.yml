# n8n deploy: build from repo root Dockerfile, optional PostgreSQL, optional .env from S3
# From repo root: docker compose -f deploy/docker-compose.yml up --build
# Copy deploy/.env.example to deploy/.env и заполни нужные переменные.
# See deploy/README.md for setup.

services:
  n8n:
    image: n8n:latest
    build:
      context: ..
      dockerfile: ../Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5678:5678"
    environment:
      - N8N_USER_FOLDER=/home/node/.n8n
      # Переменные ниже можно задать в .env или через S3; здесь дефолты для compose.
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-localhost}
      - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-n8n}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-}
      - DB_POSTGRESDB_SCHEMA=${DB_POSTGRESDB_SCHEMA:-public}
      - S3_ENV_URI=${S3_ENV_URI:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    volumes:
      - n8n_data:/home/node/.n8n
    # Раскомментуй, если нужны свои сертификаты для PostgreSQL SSL
    # volumes:
    #   - ./custom-certificates:/opt/custom-certificates:ro

volumes:
  n8n_data:
